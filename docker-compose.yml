
services:
  ask-bot:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"  # Webhook / API
    volumes:
      - ./functions:/app
      - /app/node_modules  # Preserve container node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
      - PORT=3000
      # Firebase (connects to local emulator)
      - FIREBASE_PROJECT_ID=demo-ask-bot
      - GOOGLE_CLOUD_PROJECT=demo-ask-bot
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - PUBSUB_EMULATOR_HOST=firebase-emulator:8085
      # Twilio (leave blank in demo mode)
      - TWILIO_ACCOUNT_SID=
      - TWILIO_AUTH_TOKEN=
      - TWILIO_WHATSAPP_NUMBER=
      # Pub/Sub topics
      - PUBSUB_TOPIC_MORNING_SEND=morning-send-topic
      - PUBSUB_TOPIC_REMINDER_SEND=reminder-send-topic
    command: yarn start:server

  # ── Optional: keep Firebase emulators as a separate service ──────────────
  # Uncomment when you're ready to test with real Firestore/Pub/Sub locally.
  
  firebase-emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    ports:
      - "4000:4000"
      - "5001:5001"
      - "8080:8080"
      - "8085:8085"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    environment:
      - FIREBASE_PROJECT_ID=demo-ask-bot
      - GOOGLE_CLOUD_PROJECT=demo-ask-bot
      - FIRESTORE_EMULATOR_HOST=localhost:8080
      - PUBSUB_EMULATOR_HOST=localhost:8085
    command: >
      sh -c "cd functions && yarn install && yarn build &&
      firebase emulators:start --project demo-ask-bot"
