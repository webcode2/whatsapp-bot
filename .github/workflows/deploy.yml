name: Deploy ASK WhatsApp Bot to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:          # Allow manual trigger from GitHub UI

env:
  PROJECT_ID: whatapp-497611
  REGION: us-central1
  RUNTIME: nodejs22

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: functions/yarn.lock

      - name: Install dependencies
        working-directory: ./functions
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Compile TypeScript
        working-directory: ./functions
        run: npx tsc

      - name: Verify compiled output
        working-directory: ./functions
        run: |
          if [ ! -f "lib/index.js" ]; then
            echo "❌ Build failed — lib/index.js not found"
            exit 1
          fi
          echo "✅ Build output verified: $(ls lib/)"

      - name: Upload compiled artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-functions
          path: functions/lib/
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to GCP
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: build               # Only deploy if build succeeds
    environment: production    # Requires environment protection rules in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: functions/yarn.lock

      - name: Install dependencies
        working-directory: ./functions
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Download compiled artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-functions
          path: functions/lib/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set active GCP project
        run: gcloud config set project $PROJECT_ID

      - name: Enable required GCP APIs
        run: |
          gcloud services enable \
            cloudfunctions.googleapis.com \
            cloudbuild.googleapis.com \
            pubsub.googleapis.com \
            cloudscheduler.googleapis.com \
            secretmanager.googleapis.com \
            eventarc.googleapis.com

      - name: Grant Secret Manager access to Cloud Functions service account
        run: |
          PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
          gcloud projects add-iam-policy-binding $PROJECT_ID \
            --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Create Pub/Sub topics
        run: |
          for topic in morning-send-topic reminder-send-topic morning-dispatch-trigger reminder-dispatch-trigger reconcile-trigger; do
            gcloud pubsub topics create $topic 2>/dev/null || echo "Topic $topic already exists"
          done

      - name: Create Firestore composite indexes
        run: |
          gcloud firestore indexes composite create --database='(default)' \
            --collection-group=users --query-scope=COLLECTION \
            --field-config=field-path=paused,order=ascending \
            --field-config=field-path=nextSendAt,order=ascending 2>&1 || true

          gcloud firestore indexes composite create --database='(default)' \
            --collection-group=users --query-scope=COLLECTION \
            --field-config=field-path=paused,order=ascending \
            --field-config=field-path=nextReminderAt,order=ascending 2>&1 || true

          gcloud firestore indexes composite create --database='(default)' \
            --collection-group=users --query-scope=COLLECTION \
            --field-config=field-path=lockedUntil,order=ascending 2>&1 || true

      - name: Deploy whatsappWebhook
        run: |
          gcloud functions deploy whatsappWebhook \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=whatsappWebhook \
            --trigger-http --allow-unauthenticated \
            --set-env-vars=PUBSUB_TOPIC_MORNING_SEND=morning-send-topic,PUBSUB_TOPIC_REMINDER_SEND=reminder-send-topic,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIREBASE_PROJECT_ID=$PROJECT_ID \
            --set-secrets=TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_WHATSAPP_NUMBER=TWILIO_WHATSAPP_NUMBER:latest,TWILIO_CONTENT_SID_QUIZ=TWILIO_CONTENT_SID_QUIZ:latest

      - name: Deploy processMorningDispatch
        run: |
          gcloud functions deploy processMorningDispatch \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=processMorningDispatch \
            --trigger-topic=morning-dispatch-trigger \
            --set-env-vars=PUBSUB_TOPIC_MORNING_SEND=morning-send-topic,GOOGLE_CLOUD_PROJECT=$PROJECT_ID

      - name: Deploy processReminderDispatch
        run: |
          gcloud functions deploy processReminderDispatch \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=processReminderDispatch \
            --trigger-topic=reminder-dispatch-trigger \
            --set-env-vars=PUBSUB_TOPIC_REMINDER_SEND=reminder-send-topic,GOOGLE_CLOUD_PROJECT=$PROJECT_ID

      - name: Deploy processSendWorker
        run: |
          gcloud functions deploy processSendWorker \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=processSendWorker \
            --trigger-topic=morning-send-topic \
            --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID \
            --set-secrets=TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_WHATSAPP_NUMBER=TWILIO_WHATSAPP_NUMBER:latest

      - name: Deploy processReminderWorker
        run: |
          gcloud functions deploy processReminderWorker \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=processReminderWorker \
            --trigger-topic=reminder-send-topic \
            --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID \
            --set-secrets=TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_WHATSAPP_NUMBER=TWILIO_WHATSAPP_NUMBER:latest

      - name: Deploy reconcileStuckJobs
        run: |
          gcloud functions deploy reconcileStuckJobs \
            --gen2 --region=$REGION --runtime=$RUNTIME \
            --source="$(pwd)/functions" --entry-point=reconcileStuckJobs \
            --trigger-topic=reconcile-trigger \
            --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID

      - name: Create/update Cloud Schedulers
        run: |
          upsert_scheduler() {
            local JOB_NAME=$1
            local SCHEDULE=$2
            local TOPIC=$3
            if gcloud scheduler jobs describe "$JOB_NAME" --location=$REGION > /dev/null 2>&1; then
              gcloud scheduler jobs update pubsub "$JOB_NAME" \
                --schedule="$SCHEDULE" --topic="$TOPIC" --message-body="{}" --location=$REGION
            else
              gcloud scheduler jobs create pubsub "$JOB_NAME" \
                --schedule="$SCHEDULE" --topic="$TOPIC" --message-body="{}" --location=$REGION
            fi
          }
          upsert_scheduler "processMorningDispatchJob"  '* * * * *'    "morning-dispatch-trigger"
          upsert_scheduler "processReminderDispatchJob" '* * * * *'    "reminder-dispatch-trigger"
          upsert_scheduler "reconcileStuckJobsJob"      '*/10 * * * *' "reconcile-trigger"

  # ─────────────────────────────────────────────
  # JOB 3: Verify Deployment
  # ─────────────────────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Verify all functions are ACTIVE
        run: |
          echo "=== Cloud Functions Status ==="
          FAILED=0
          for fn in whatsappWebhook processMorningDispatch processReminderDispatch processSendWorker processReminderWorker reconcileStuckJobs; do
            STATE=$(gcloud functions describe $fn --region=$REGION --format='value(state)' 2>/dev/null || echo "NOT_FOUND")
            if [ "$STATE" == "ACTIVE" ]; then
              echo "✅ $fn — ACTIVE"
            else
              echo "❌ $fn — $STATE"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

      - name: Verify Cloud Schedulers are ENABLED
        run: |
          echo "=== Cloud Scheduler Status ==="
          for job in processMorningDispatchJob processReminderDispatchJob reconcileStuckJobsJob; do
            STATE=$(gcloud scheduler jobs describe $job --location=$REGION --format='value(state)' 2>/dev/null || echo "NOT_FOUND")
            echo "$( [ "$STATE" == 'ENABLED' ] && echo '✅' || echo '❌' ) $job — $STATE"
          done

      - name: Health check webhook
        run: |
          echo "=== Webhook Health Check ==="
          RESPONSE=$(curl -sf https://us-central1-$PROJECT_ID.cloudfunctions.net/whatsappWebhook/health)
          echo "Response: $RESPONSE"
          echo $RESPONSE | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('status') == 'ok':
              print('✅ Webhook is healthy')
          else:
              print('❌ Webhook returned unexpected response')
              sys.exit(1)
          "

      - name: Print deployment summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ ASK WhatsApp Bot — Deployment Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Webhook URL (paste into Twilio Sandbox):"
          echo "  https://us-central1-$PROJECT_ID.cloudfunctions.net/whatsappWebhook"
          echo ""
          echo "  Project  : $PROJECT_ID"
          echo "  Region   : $REGION"
          echo "  Runtime  : $RUNTIME"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
